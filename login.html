<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 40px; }
      .card { max-width: 420px; padding: 20px; border: 1px solid #ddd; border-radius: 12px; }
      label { display: block; margin-top: 12px; }
      input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
      button { margin-top: 16px; padding: 10px 14px; }
      .muted { color: #666; font-size: 14px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Welcome</h1>
      <p class="muted">This is a static page (no real login/authentication).</p>

      <form>
        <label>
          Username
          <input type="text" name="username" autocomplete="username" />
        </label>

        <label>
          Password
          <input type="password" name="password" autocomplete="current-password" />
        </label>

        <button type="button">Sign in</button>
      </form>
    </div>
  </body>
</html>
